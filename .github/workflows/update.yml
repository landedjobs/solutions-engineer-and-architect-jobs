name: Update job list
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate README
        run: python3 build_readme.py
      - name: Commit changes
        run: |
          git config user.name "landed-bot"
          git config user.email "bot@landed.jobs"
          git add -A
          git diff --staged --quiet || git commit -m "chore: refresh job list ($(date -u +%F))"
          git push
